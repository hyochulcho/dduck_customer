<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F97316">
    <title>떡집 고객관리 시스템</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #FEF3C7; padding-bottom: 80px; }
        .container { max-width: 768px; margin: 0 auto; padding: 8px; }
        .header { background: linear-gradient(135deg, #F97316 0%, #EA580C 100%); color: white; padding: 16px; border-radius: 16px; margin-bottom: 12px; text-align: center; }
        .header h1 { font-size: 1.5rem; font-weight: 700; }
        .sync-status { background: #FEF3C7; border: 1px solid #F59E0B; border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem; }
        .sync-status.synced { background: #D1FAE5; border-color: #10B981; }
        .sync-status.error { background: #FEE2E2; border-color: #EF4444; }
        .sync-btn { background: #F97316; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .nav-tabs { display: flex; background: white; border-radius: 12px; padding: 4px; margin-bottom: 12px; overflow-x: auto; }
        .nav-tab { flex: 1; min-width: 60px; padding: 10px 6px; border: none; background: none; cursor: pointer; border-radius: 8px; font-size: 0.75rem; font-weight: 500; color: #64748B; white-space: nowrap; }
        .nav-tab.active { background: #F97316; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .card-title { font-size: 1rem; font-weight: 700; color: #1E293B; margin-bottom: 12px; }
        .form-group { margin-bottom: 12px; }
        .form-label { display: block; font-size: 0.85rem; font-weight: 600; color: #374151; margin-bottom: 6px; }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 12px; border: 2px solid #E5E7EB; border-radius: 10px; font-size: 16px; }
        .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: #F97316; outline: none; }
        .form-textarea { min-height: 80px; resize: vertical; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; padding: 8px 0; }
        .checkbox-group input { width: 20px; height: 20px; }
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 12px 20px; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
        .btn-primary { background: linear-gradient(135deg, #F97316, #EA580C); color: white; width: 100%; }
        .btn-secondary { background: #F1F5F9; color: #475569; }
        .btn-success { background: #10B981; color: white; }
        .btn-danger { background: #EF4444; color: white; }
        .btn-small { padding: 8px 12px; font-size: 0.8rem; }
        .order-card { background: white; border-radius: 12px; padding: 14px; margin-bottom: 10px; border-left: 4px solid #F97316; }
        .order-card.completed { border-left-color: #10B981; opacity: 0.7; }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .order-name { font-weight: 700; font-size: 1rem; }
        .order-status { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .status-pending { background: #FEF3C7; color: #D97706; }
        .status-completed { background: #D1FAE5; color: #059669; }
        .order-details { font-size: 0.85rem; color: #64748B; line-height: 1.6; }
        .order-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .customer-card { background: white; border-radius: 12px; padding: 14px; margin-bottom: 10px; cursor: pointer; }
        .customer-card:hover { background: #FFF7ED; }
        .customer-name { font-weight: 700; font-size: 1rem; }
        .customer-info { font-size: 0.85rem; color: #64748B; margin-top: 4px; }
        .customer-stats { display: flex; gap: 12px; margin-top: 8px; font-size: 0.8rem; color: #F97316; font-weight: 600; }
        .folder-card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .folder-card:hover { background: #FFF7ED; }
        .folder-icon { font-size: 2rem; }
        .folder-info { flex: 1; }
        .folder-name { font-weight: 700; }
        .folder-count { font-size: 0.8rem; color: #64748B; }
        .folder-actions { display: flex; gap: 4px; }
        .folder-actions button { background: none; border: none; cursor: pointer; font-size: 1rem; padding: 4px; }
        .memo-card { background: white; border-radius: 12px; padding: 14px; margin-bottom: 10px; cursor: pointer; border-left: 4px solid #F97316; }
        .memo-title { font-weight: 700; margin-bottom: 4px; }
        .memo-preview { font-size: 0.85rem; color: #64748B; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .memo-date { font-size: 0.75rem; color: #9CA3AF; margin-top: 6px; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 16px; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 16px; padding: 20px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .modal-title { font-size: 1.1rem; font-weight: 700; }
        .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #9CA3AF; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stat-card { background: linear-gradient(135deg, #FFF7ED, #FFEDD5); border-radius: 12px; padding: 16px; text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: #F97316; }
        .stat-label { font-size: 0.8rem; color: #64748B; }
        .date-filter { display: flex; gap: 8px; margin-bottom: 12px; }
        .date-filter input { flex: 1; }
        .search-box { margin-bottom: 12px; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #F1F5F9; }
        .message-option { padding: 12px; border: 2px solid #E5E7EB; border-radius: 10px; margin-bottom: 8px; cursor: pointer; }
        .message-option:hover { border-color: #F97316; background: #FFF7ED; }
        .icon-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
        .icon-option { padding: 10px; text-align: center; font-size: 1.5rem; border: 2px solid #E5E7EB; border-radius: 8px; cursor: pointer; }
        .icon-option:hover, .icon-option.selected { border-color: #F97316; background: #FFF7ED; }
        .payment-filters { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .payment-filter { padding: 8px 16px; border-radius: 20px; border: 2px solid #E5E7EB; background: white; cursor: pointer; font-size: 0.85rem; }
        .payment-filter.active { border-color: #F97316; background: #FFF7ED; color: #F97316; }
        .autocomplete-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 2px solid #E5E7EB; border-top: none; border-radius: 0 0 10px 10px; max-height: 200px; overflow-y: auto; z-index: 100; display: none; }
        .autocomplete-dropdown.show { display: block; }
        .autocomplete-item { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid #F1F5F9; }
        .autocomplete-item:hover { background: #FFF7ED; }
        .customer-found { background: #D1FAE5; border: 1px solid #10B981; border-radius: 8px; padding: 10px; margin-top: 8px; font-size: 0.85rem; color: #065F46; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍡 떡뜨래 고객관리</h1>
            <p id="today-date"></p>
        </div>
        
        <div class="sync-status" id="syncStatus">
            <span id="syncText">🔄 동기화 확인 중...</span>
            <button class="sync-btn" onclick="loadFromServer()">새로고침</button>
        </div>

        <div class="nav-tabs">
            <button class="nav-tab active" onclick="switchTab('order', this)">📝 주문</button>
            <button class="nav-tab" onclick="switchTab('customers', this)">👥 고객</button>
            <button class="nav-tab" onclick="switchTab('today', this)">🚚 배송</button>
            <button class="nav-tab" onclick="switchTab('status', this)">📊 현황</button>
            <button class="nav-tab" onclick="switchTab('memo', this)">📒 메모</button>
            <button class="nav-tab" onclick="switchTab('stats', this)">📈 통계</button>
            <button class="nav-tab" onclick="switchTab('settings', this)">⚙️ 설정</button>
        </div>

        <!-- 주문 입력 -->
        <div id="tab-order" class="tab-content active">
            <div class="card">
                <div class="card-title">📝 새 주문 등록</div>
                <div class="form-group" style="position:relative;">
                    <label class="form-label">주문자명 *</label>
                    <input type="text" id="ordererName" class="form-input" placeholder="이름" oninput="searchCustomerByName(this.value)">
                    <div class="autocomplete-dropdown" id="nameAutocomplete"></div>
                </div>
                <div class="form-group" style="position:relative;">
                    <label class="form-label">연락처 *</label>
                    <input type="tel" id="ordererPhone" class="form-input" placeholder="010-0000-0000" oninput="searchCustomerByPhone(this.value)">
                    <div class="autocomplete-dropdown" id="phoneAutocomplete"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">주소</label>
                    <input type="text" id="ordererAddress" class="form-input" placeholder="주소">
                </div>
                <div id="customerFoundInfo" class="customer-found" style="display:none;"></div>
                
                <hr style="margin:16px 0;border:none;border-top:1px solid #E5E7EB;">
                <div class="checkbox-group">
                    <input type="checkbox" id="sameAsOrderer" onchange="toggleSameAsOrderer()">
                    <label for="sameAsOrderer">받는 분이 주문자와 동일</label>
                </div>
                <div id="receiverSection">
                    <div class="form-group">
                        <label class="form-label">받는 분</label>
                        <input type="text" id="receiverName" class="form-input" placeholder="이름">
                    </div>
                    <div class="form-group">
                        <label class="form-label">받는 분 연락처</label>
                        <input type="tel" id="receiverPhone" class="form-input" placeholder="010-0000-0000">
                    </div>
                    <div class="form-group">
                        <label class="form-label">배송지 주소</label>
                        <input type="text" id="receiverAddress" class="form-input" placeholder="주소">
                    </div>
                </div>
                
                <hr style="margin:16px 0;border:none;border-top:1px solid #E5E7EB;">
                <div class="form-group">
                    <label class="form-label">주문내용 *</label>
                    <textarea id="menu" class="form-textarea" placeholder="예: 인절미 2kg, 송편 30개"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">배송일자 *</label>
                    <input type="date" id="deliveryDate" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">배송시간</label>
                    <select id="deliveryTime" class="form-select">
                        <option value="">선택</option>
                        <option>오전 9시</option><option>오전 10시</option><option>오전 11시</option>
                        <option>오후 12시</option><option>오후 1시</option><option>오후 2시</option>
                        <option>오후 3시</option><option>오후 4시</option><option>오후 5시</option>
                        <option>저녁 6시 이후</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">금액</label>
                    <input type="text" id="amount" class="form-input" placeholder="50000">
                </div>
                <div class="form-group">
                    <label class="form-label">입금방법</label>
                    <select id="paymentMethod" class="form-select">
                        <option value="">선택</option>
                        <option>계좌이체</option><option>카드결제</option><option>현금</option><option>후불</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">입금상태</label>
                    <select id="paymentStatus" class="form-select">
                        <option value="미입금">미입금</option>
                        <option value="입금완료">입금완료</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">유입경로</label>
                    <select id="source" class="form-select">
                        <option value="">선택</option>
                        <option>인스타그램</option><option>네이버</option><option>지인소개</option><option>기존고객</option><option>기타</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">메모</label>
                    <textarea id="orderMemo" class="form-textarea" placeholder="특이사항"></textarea>
                </div>
                <button class="btn btn-primary" onclick="saveOrder()">💾 주문 저장</button>
            </div>
        </div>

        <!-- 고객 -->
        <div id="tab-customers" class="tab-content">
            <div class="search-box">
                <input type="text" id="customerSearch" class="form-input" placeholder="🔍 이름 또는 연락처 검색" oninput="filterCustomers(this.value)">
            </div>
            <div id="customerList"></div>
        </div>

        <!-- 오늘 배송 -->
        <div id="tab-today" class="tab-content">
            <div class="card">
                <div class="card-title">🚚 오늘 배송</div>
                <div id="todayDeliveryList"></div>
            </div>
        </div>

        <!-- 주문 현황 -->
        <div id="tab-status" class="tab-content">
            <div class="date-filter">
                <input type="date" id="statusStartDate" class="form-input">
                <input type="date" id="statusEndDate" class="form-input">
            </div>
            <div class="payment-filters">
                <button class="payment-filter active" onclick="filterByPayment('all', this)">전체</button>
                <button class="payment-filter" onclick="filterByPayment('미입금', this)">미입금</button>
                <button class="payment-filter" onclick="filterByPayment('입금완료', this)">입금완료</button>
            </div>
            <div id="orderStatusList"></div>
        </div>

        <!-- 메모장 -->
        <div id="tab-memo" class="tab-content">
            <div id="memoFolderView">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                    <h3 style="font-weight:700;">📁 폴더</h3>
                    <button class="btn btn-primary btn-small" onclick="showAddFolderModal()">+ 폴더</button>
                </div>
                <div id="folderList"></div>
            </div>
            <div id="memoDetailView" style="display:none;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                    <button class="btn btn-secondary btn-small" onclick="backToFolders()">← 뒤로</button>
                    <h3 id="currentFolderName" style="font-weight:700;"></h3>
                    <button class="btn btn-primary btn-small" onclick="showAddMemoModal()">+ 메모</button>
                </div>
                <div id="memoList"></div>
            </div>
        </div>

        <!-- 통계 -->
        <div id="tab-stats" class="tab-content">
            <div class="date-filter">
                <input type="date" id="statsStartDate" class="form-input" onchange="updateStats()">
                <input type="date" id="statsEndDate" class="form-input" onchange="updateStats()">
            </div>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value" id="statTotalOrders">0</div><div class="stat-label">총 주문</div></div>
                <div class="stat-card"><div class="stat-value" id="statTotalRevenue">0</div><div class="stat-label">총 매출</div></div>
                <div class="stat-card"><div class="stat-value" id="statPending">0</div><div class="stat-label">미입금</div></div>
                <div class="stat-card"><div class="stat-value" id="statCompleted">0</div><div class="stat-label">입금완료</div></div>
            </div>
            <div class="card" style="margin-top:12px;">
                <div class="card-title">📊 유입경로별</div>
                <div id="sourceStats"></div>
            </div>
        </div>

        <!-- 설정 -->
        <div id="tab-settings" class="tab-content">
            <div class="card">
                <div class="card-title">⚙️ 설정</div>
                <div class="setting-item">
                    <span>서버에서 불러오기</span>
                    <button class="btn btn-secondary btn-small" onclick="loadFromServer()">불러오기</button>
                </div>
                <div class="setting-item">
                    <span>서버로 전체 저장</span>
                    <button class="btn btn-secondary btn-small" onclick="saveAllToServer()">저장</button>
                </div>
                <div class="setting-item">
                    <span>데이터 백업</span>
                    <button class="btn btn-secondary btn-small" onclick="backupData()">다운로드</button>
                </div>
                <div class="setting-item">
                    <span>데이터 복원</span>
                    <input type="file" id="restoreFile" accept=".json" style="display:none;" onchange="restoreData(event)">
                    <button class="btn btn-secondary btn-small" onclick="document.getElementById('restoreFile').click()">파일선택</button>
                </div>
                <div class="setting-item">
                    <span style="color:#EF4444;">전체 삭제</span>
                    <button class="btn btn-danger btn-small" onclick="clearAllData()">삭제</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 모달들 -->
    <div class="modal" id="customerModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">👤 고객 정보</h3>
                <button class="modal-close" onclick="closeModal('customerModal')">×</button>
            </div>
            <div id="customerModalContent"></div>
        </div>
    </div>

    <div class="modal" id="editCustomerModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">✏️ 고객 수정</h3>
                <button class="modal-close" onclick="closeModal('editCustomerModal')">×</button>
            </div>
            <input type="hidden" id="editCustomerOriginalPhone">
            <div class="form-group"><label class="form-label">이름</label><input type="text" id="editCustomerName" class="form-input"></div>
            <div class="form-group"><label class="form-label">연락처</label><input type="tel" id="editCustomerPhone" class="form-input"></div>
            <div class="form-group"><label class="form-label">주소</label><input type="text" id="editCustomerAddress" class="form-input"></div>
            <button class="btn btn-primary" onclick="saveCustomerEdit()">💾 저장</button>
        </div>
    </div>

    <div class="modal" id="orderModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">📋 주문 상세</h3>
                <button class="modal-close" onclick="closeModal('orderModal')">×</button>
            </div>
            <div id="orderModalContent"></div>
        </div>
    </div>

    <div class="modal" id="editOrderModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">✏️ 주문 수정</h3>
                <button class="modal-close" onclick="closeModal('editOrderModal')">×</button>
            </div>
            <input type="hidden" id="editOrderId">
            <div class="form-group"><label class="form-label">주문자명</label><input type="text" id="editOrdererName" class="form-input"></div>
            <div class="form-group"><label class="form-label">연락처</label><input type="tel" id="editOrdererPhone" class="form-input"></div>
            <div class="form-group"><label class="form-label">주소</label><input type="text" id="editOrdererAddress" class="form-input"></div>
            <div class="form-group"><label class="form-label">받는분</label><input type="text" id="editReceiverName" class="form-input"></div>
            <div class="form-group"><label class="form-label">받는분 연락처</label><input type="tel" id="editReceiverPhone" class="form-input"></div>
            <div class="form-group"><label class="form-label">배송지</label><input type="text" id="editReceiverAddress" class="form-input"></div>
            <div class="form-group"><label class="form-label">주문내용</label><textarea id="editMenu" class="form-textarea"></textarea></div>
            <div class="form-group"><label class="form-label">배송일자</label><input type="date" id="editDeliveryDate" class="form-input"></div>
            <div class="form-group"><label class="form-label">배송시간</label>
                <select id="editDeliveryTime" class="form-select">
                    <option value="">선택</option>
                    <option>오전 9시</option><option>오전 10시</option><option>오전 11시</option>
                    <option>오후 12시</option><option>오후 1시</option><option>오후 2시</option>
                    <option>오후 3시</option><option>오후 4시</option><option>오후 5시</option>
                    <option>저녁 6시 이후</option>
                </select>
            </div>
            <div class="form-group"><label class="form-label">금액</label><input type="text" id="editAmount" class="form-input"></div>
            <div class="form-group"><label class="form-label">입금상태</label>
                <select id="editPaymentStatus" class="form-select">
                    <option value="미입금">미입금</option>
                    <option value="입금완료">입금완료</option>
                </select>
            </div>
            <div class="form-group"><label class="form-label">메모</label><textarea id="editOrderMemo" class="form-textarea"></textarea></div>
            <button class="btn btn-primary" onclick="saveOrderEdit()">💾 저장</button>
        </div>
    </div>

    <div class="modal" id="folderModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="folderModalTitle">📁 새 폴더</h3>
                <button class="modal-close" onclick="closeModal('folderModal')">×</button>
            </div>
            <input type="hidden" id="editFolderId">
            <div class="form-group"><label class="form-label">폴더 이름</label><input type="text" id="folderNameInput" class="form-input"></div>
            <div class="form-group"><label class="form-label">아이콘</label><div class="icon-grid" id="iconGrid"></div></div>
            <button class="btn btn-primary" onclick="saveFolder()">💾 저장</button>
        </div>
    </div>

    <div class="modal" id="memoModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="memoModalTitle">📝 새 메모</h3>
                <button class="modal-close" onclick="closeModal('memoModal')">×</button>
            </div>
            <input type="hidden" id="editMemoId">
            <div class="form-group"><label class="form-label">제목</label><input type="text" id="memoTitleInput" class="form-input"></div>
            <div class="form-group"><label class="form-label">내용</label><textarea id="memoContentInput" class="form-textarea" rows="8"></textarea></div>
            <button class="btn btn-primary" onclick="saveMemo()">💾 저장</button>
        </div>
    </div>

    <div class="modal" id="memoViewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="memoViewTitle">메모</h3>
                <button class="modal-close" onclick="closeModal('memoViewModal')">×</button>
            </div>
            <div id="memoViewContent" style="white-space:pre-wrap;line-height:1.8;"></div>
            <div style="display:flex;gap:8px;margin-top:16px;">
                <button class="btn btn-secondary" style="flex:1;" onclick="editCurrentMemo()">✏️ 수정</button>
                <button class="btn btn-danger" style="flex:1;" onclick="deleteCurrentMemo()">🗑️ 삭제</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbz29HGailWot_sUhPeAINbrQzA5-21buQyW1QXO5OEcdMRu3sGdK56vEnC31ACdIpU3WA/exec';
        
        let currentFolderId = null;
        let currentMemoId = null;
        let currentPaymentFilter = 'all';
        let selectedFolderIcon = '📁';
        const FOLDER_ICONS = ['📁','⭐','📌','💼','🏠','🎂','🍡','🎁','❤️','📋','🔖','💡'];

        // 초기화
        document.addEventListener('DOMContentLoaded', async function() {
            updateTodayDate();
            initDates();
            initDefaultData();
            await loadFromServer();
            renderAll();
        });

        function updateTodayDate() {
            const now = new Date();
            const days = ['일','월','화','수','목','금','토'];
            document.getElementById('today-date').textContent = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}요일`;
        }

        function initDates() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('deliveryDate').value = today;
            document.getElementById('statusStartDate').value = today;
            document.getElementById('statusEndDate').value = today;
            document.getElementById('statsStartDate').value = today;
            document.getElementById('statsEndDate').value = today;
        }

        function initDefaultData() {
            if (!localStorage.getItem('dduck_orders')) localStorage.setItem('dduck_orders', '[]');
            if (!localStorage.getItem('dduck_folders')) localStorage.setItem('dduck_folders', JSON.stringify([{id:1,name:'일반',icon:'📁'},{id:2,name:'중요',icon:'⭐'}]));
            if (!localStorage.getItem('dduck_memos')) localStorage.setItem('dduck_memos', '[]');
        }

        // 서버 통신
        async function loadFromServer() {
            updateSyncStatus('loading', '🔄 불러오는 중...');
            try {
                const res = await fetch(API_URL + '?action=getAllData');
                const data = await res.json();
                if (data.success) {
                    if (data.orders?.length) localStorage.setItem('dduck_orders', JSON.stringify(data.orders));
                    if (data.folders?.length) localStorage.setItem('dduck_folders', JSON.stringify(data.folders));
                    if (data.memos?.length) localStorage.setItem('dduck_memos', JSON.stringify(data.memos));
                    updateSyncStatus('synced', '✅ 동기화 완료');
                    renderAll();
                }
            } catch (e) {
                updateSyncStatus('error', '⚠️ 연결 실패');
            }
        }

        async function saveToServer(action, data) {
            try {
                await fetch(API_URL + '?action=' + action + '&data=' + encodeURIComponent(JSON.stringify(data)));
                return true;
            } catch (e) { return false; }
        }

        async function deleteFromServer(action, id) {
            try {
                await fetch(API_URL + '?action=' + action + '&id=' + id);
                return true;
            } catch (e) { return false; }
        }

        async function saveAllToServer() {
            updateSyncStatus('loading', '🔄 업로드 중...');
            const orders = getOrders();
            const folders = getFolders();
            const memos = getMemos();
            for (const o of orders) await saveToServer('saveOrder', o);
            for (const f of folders) await saveToServer('saveFolder', f);
            for (const m of memos) await saveToServer('saveMemo', m);
            updateSyncStatus('synced', '✅ 업로드 완료');
            alert('✅ 서버에 저장되었습니다!');
        }

        function updateSyncStatus(type, text) {
            const el = document.getElementById('syncStatus');
            el.className = 'sync-status ' + type;
            document.getElementById('syncText').textContent = text;
        }

        // 로컬 데이터
        function getOrders() { return JSON.parse(localStorage.getItem('dduck_orders') || '[]'); }
        function saveOrders(orders) { localStorage.setItem('dduck_orders', JSON.stringify(orders)); }
        function getFolders() { return JSON.parse(localStorage.getItem('dduck_folders') || '[]'); }
        function saveFolders(folders) { localStorage.setItem('dduck_folders', JSON.stringify(folders)); }
        function getMemos() { return JSON.parse(localStorage.getItem('dduck_memos') || '[]'); }
        function saveMemos(memos) { localStorage.setItem('dduck_memos', JSON.stringify(memos)); }

        // 탭
        function switchTab(name, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + name).classList.add('active');
            btn.classList.add('active');
            if (name === 'status') renderOrderStatus();
            if (name === 'stats') updateStats();
        }

        // 모달
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        // 주문자와 동일
        function toggleSameAsOrderer() {
            const checked = document.getElementById('sameAsOrderer').checked;
            document.getElementById('receiverSection').style.display = checked ? 'none' : 'block';
        }

        // 고객 검색
        function searchCustomerByName(name) {
            const dropdown = document.getElementById('nameAutocomplete');
            if (name.length < 1) { dropdown.classList.remove('show'); return; }
            const customers = generateCustomers().filter(c => c.name.includes(name)).slice(0, 5);
            if (customers.length) {
                dropdown.innerHTML = customers.map(c => `<div class="autocomplete-item" onclick="selectCustomer('${c.phone}')">${c.name} - ${c.phone}</div>`).join('');
                dropdown.classList.add('show');
            } else { dropdown.classList.remove('show'); }
        }

        function searchCustomerByPhone(phone) {
            const dropdown = document.getElementById('phoneAutocomplete');
            if (phone.length < 3) { dropdown.classList.remove('show'); return; }
            const customers = generateCustomers().filter(c => c.phone.includes(phone)).slice(0, 5);
            if (customers.length) {
                dropdown.innerHTML = customers.map(c => `<div class="autocomplete-item" onclick="selectCustomer('${c.phone}')">${c.name} - ${c.phone}</div>`).join('');
                dropdown.classList.add('show');
            } else { dropdown.classList.remove('show'); }
        }

        function selectCustomer(phone) {
            const c = generateCustomers().find(x => x.phone === phone);
            if (c) {
                document.getElementById('ordererName').value = c.name;
                document.getElementById('ordererPhone').value = c.phone;
                document.getElementById('ordererAddress').value = c.address || '';
                document.getElementById('customerFoundInfo').style.display = 'block';
                document.getElementById('customerFoundInfo').innerHTML = `✅ 기존고객: ${c.name} | 주문 ${c.orderCount}회`;
            }
            document.getElementById('nameAutocomplete').classList.remove('show');
            document.getElementById('phoneAutocomplete').classList.remove('show');
        }

        // 주문 저장
        async function saveOrder() {
            const name = document.getElementById('ordererName').value.trim();
            const phone = document.getElementById('ordererPhone').value.trim();
            const menu = document.getElementById('menu').value.trim();
            const date = document.getElementById('deliveryDate').value;
            if (!name || !phone || !menu || !date) { alert('필수 항목을 입력하세요'); return; }
            
            const same = document.getElementById('sameAsOrderer').checked;
            const order = {
                id: Date.now().toString(),
                ordererName: name, ordererPhone: phone,
                ordererAddress: document.getElementById('ordererAddress').value.trim(),
                receiverName: same ? name : document.getElementById('receiverName').value.trim(),
                receiverPhone: same ? phone : document.getElementById('receiverPhone').value.trim(),
                receiverAddress: same ? document.getElementById('ordererAddress').value.trim() : document.getElementById('receiverAddress').value.trim(),
                menu, deliveryDate: date,
                deliveryTime: document.getElementById('deliveryTime').value,
                amount: document.getElementById('amount').value.replace(/,/g, ''),
                paymentMethod: document.getElementById('paymentMethod').value,
                paymentStatus: document.getElementById('paymentStatus').value,
                source: document.getElementById('source').value,
                memo: document.getElementById('orderMemo').value.trim(),
                createdAt: new Date().toISOString(),
                completed: false
            };
            
            const orders = getOrders();
            orders.push(order);
            saveOrders(orders);
            await saveToServer('saveOrder', order);
            
            // 초기화
            ['ordererName','ordererPhone','ordererAddress','receiverName','receiverPhone','receiverAddress','menu','orderMemo','amount'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('paymentStatus').value = '미입금';
            document.getElementById('sameAsOrderer').checked = false;
            document.getElementById('receiverSection').style.display = 'block';
            document.getElementById('customerFoundInfo').style.display = 'none';
            
            alert('✅ 저장되었습니다!');
            renderAll();
        }

        // 고객
        function generateCustomers() {
            const orders = getOrders();
            const map = {};
            orders.forEach(o => {
                if (!map[o.ordererPhone]) {
                    map[o.ordererPhone] = { name: o.ordererName, phone: o.ordererPhone, address: o.ordererAddress, orderCount: 0, totalAmount: 0, orders: [] };
                }
                map[o.ordererPhone].orderCount++;
                map[o.ordererPhone].totalAmount += parseInt(o.amount || 0);
                map[o.ordererPhone].orders.push(o);
                map[o.ordererPhone].address = o.ordererAddress || map[o.ordererPhone].address;
            });
            return Object.values(map).sort((a, b) => b.orderCount - a.orderCount);
        }

        function renderCustomers() {
            const customers = generateCustomers();
            const list = document.getElementById('customerList');
            if (!customers.length) { list.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">고객이 없습니다</div>'; return; }
            list.innerHTML = customers.map(c => `
                <div class="customer-card" onclick="showCustomerDetail('${c.phone}')">
                    <div class="customer-name">${c.name}</div>
                    <div class="customer-info">${c.phone}</div>
                    <div class="customer-stats"><span>주문 ${c.orderCount}회</span><span>총 ${c.totalAmount.toLocaleString()}원</span></div>
                </div>
            `).join('');
        }

        function filterCustomers(q) {
            const customers = generateCustomers().filter(c => c.name.includes(q) || c.phone.includes(q));
            const list = document.getElementById('customerList');
            if (!customers.length) { list.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">결과 없음</div>'; return; }
            list.innerHTML = customers.map(c => `
                <div class="customer-card" onclick="showCustomerDetail('${c.phone}')">
                    <div class="customer-name">${c.name}</div>
                    <div class="customer-info">${c.phone}</div>
                    <div class="customer-stats"><span>주문 ${c.orderCount}회</span></div>
                </div>
            `).join('');
        }

        function showCustomerDetail(phone) {
            const c = generateCustomers().find(x => x.phone === phone);
            if (!c) return;
            document.getElementById('customerModalContent').innerHTML = `
                <p><strong>이름:</strong> ${c.name}</p>
                <p><strong>연락처:</strong> ${c.phone}</p>
                <p><strong>주소:</strong> ${c.address || '-'}</p>
                <p><strong>총 주문:</strong> ${c.orderCount}회 / ${c.totalAmount.toLocaleString()}원</p>
                <button class="btn btn-secondary btn-small" style="margin:12px 0;" onclick="openEditCustomer('${phone}')">✏️ 정보수정</button>
                <h4 style="margin:12px 0;font-weight:700;">주문내역</h4>
                ${c.orders.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).map(o => `
                    <div class="order-card" style="margin-bottom:8px;">
                        <div>${o.deliveryDate} - ${o.menu}</div>
                        <div style="font-size:0.85rem;color:#666;">${o.amount ? parseInt(o.amount).toLocaleString() + '원' : ''} / ${o.paymentStatus}</div>
                    </div>
                `).join('')}
            `;
            document.getElementById('customerModal').classList.add('active');
        }

        function openEditCustomer(phone) {
            const c = generateCustomers().find(x => x.phone === phone);
            if (!c) return;
            document.getElementById('editCustomerOriginalPhone').value = phone;
            document.getElementById('editCustomerName').value = c.name;
            document.getElementById('editCustomerPhone').value = c.phone;
            document.getElementById('editCustomerAddress').value = c.address || '';
            closeModal('customerModal');
            document.getElementById('editCustomerModal').classList.add('active');
        }

        async function saveCustomerEdit() {
            const orig = document.getElementById('editCustomerOriginalPhone').value;
            const name = document.getElementById('editCustomerName').value.trim();
            const phone = document.getElementById('editCustomerPhone').value.trim();
            const addr = document.getElementById('editCustomerAddress').value.trim();
            if (!name || !phone) { alert('이름과 연락처 필수'); return; }
            
            const orders = getOrders();
            orders.forEach(o => {
                if (o.ordererPhone === orig) {
                    o.ordererName = name;
                    o.ordererPhone = phone;
                    o.ordererAddress = addr;
                }
            });
            saveOrders(orders);
            for (const o of orders.filter(x => x.ordererPhone === phone)) await saveToServer('saveOrder', o);
            
            alert('✅ 수정되었습니다!');
            closeModal('editCustomerModal');
            renderAll();
        }

        // 오늘 배송
        function renderTodayDelivery() {
            const today = new Date().toISOString().split('T')[0];
            const orders = getOrders().filter(o => o.deliveryDate === today);
            const list = document.getElementById('todayDeliveryList');
            if (!orders.length) { list.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">오늘 배송 없음</div>'; return; }
            
            const timeOrder = ['오전 9시','오전 10시','오전 11시','오후 12시','오후 1시','오후 2시','오후 3시','오후 4시','오후 5시','저녁 6시 이후',''];
            orders.sort((a, b) => timeOrder.indexOf(a.deliveryTime) - timeOrder.indexOf(b.deliveryTime));
            
            list.innerHTML = orders.map(o => `
                <div class="order-card ${o.completed ? 'completed' : ''}">
                    <div class="order-header">
                        <span class="order-name">${o.receiverName || o.ordererName}</span>
                        <span class="order-status ${o.completed ? 'status-completed' : 'status-pending'}">${o.completed ? '완료' : o.deliveryTime || '시간미정'}</span>
                    </div>
                    <div class="order-details">
                        <p>📦 ${o.menu}</p>
                        <p>📞 ${o.receiverPhone || o.ordererPhone}</p>
                        <p>📍 ${o.receiverAddress || o.ordererAddress || '-'}</p>
                    </div>
                    <div class="order-actions">
                        <button class="btn btn-small ${o.completed ? 'btn-secondary' : 'btn-success'}" onclick="toggleComplete('${o.id}')">${o.completed ? '↩️ 되돌리기' : '✅ 완료'}</button>
                        <button class="btn btn-secondary btn-small" onclick="location.href='tel:${o.receiverPhone || o.ordererPhone}'">📞 전화</button>
                    </div>
                </div>
            `).join('');
        }

        async function toggleComplete(id) {
            const orders = getOrders();
            const o = orders.find(x => x.id === id);
            if (o) {
                o.completed = !o.completed;
                saveOrders(orders);
                await saveToServer('saveOrder', o);
                renderTodayDelivery();
            }
        }

        // 주문 현황
        function renderOrderStatus() {
            const start = document.getElementById('statusStartDate').value;
            const end = document.getElementById('statusEndDate').value;
            let orders = getOrders().filter(o => o.deliveryDate >= start && o.deliveryDate <= end);
            if (currentPaymentFilter !== 'all') orders = orders.filter(o => o.paymentStatus === currentPaymentFilter);
            orders.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            
            const list = document.getElementById('orderStatusList');
            if (!orders.length) { list.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">주문 없음</div>'; return; }
            
            list.innerHTML = orders.map(o => `
                <div class="order-card">
                    <div class="order-header">
                        <span class="order-name">${o.ordererName}</span>
                        <span class="order-status ${o.paymentStatus === '입금완료' ? 'status-completed' : 'status-pending'}">${o.paymentStatus}</span>
                    </div>
                    <div class="order-details">
                        <p>📦 ${o.menu}</p>
                        <p>📅 ${o.deliveryDate} ${o.deliveryTime || ''}</p>
                        <p>💰 ${o.amount ? parseInt(o.amount).toLocaleString() + '원' : '-'}</p>
                    </div>
                    <div class="order-actions">
                        <button class="btn btn-secondary btn-small" onclick="showOrderDetail('${o.id}')">상세</button>
                        <button class="btn btn-small ${o.paymentStatus === '입금완료' ? 'btn-secondary' : 'btn-success'}" onclick="togglePayment('${o.id}')">${o.paymentStatus === '입금완료' ? '미입금으로' : '입금완료'}</button>
                        <button class="btn btn-danger btn-small" onclick="deleteOrder('${o.id}')">삭제</button>
                    </div>
                </div>
            `).join('');
        }

        function filterByPayment(status, btn) {
            currentPaymentFilter = status;
            document.querySelectorAll('.payment-filter').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderOrderStatus();
        }

        async function togglePayment(id) {
            const orders = getOrders();
            const o = orders.find(x => x.id === id);
            if (o) {
                o.paymentStatus = o.paymentStatus === '입금완료' ? '미입금' : '입금완료';
                saveOrders(orders);
                await saveToServer('saveOrder', o);
                renderOrderStatus();
                updateStats();
            }
        }

        function showOrderDetail(id) {
            const o = getOrders().find(x => x.id === id);
            if (!o) return;
            document.getElementById('orderModalContent').innerHTML = `
                <div style="line-height:2;">
                    <p><strong>주문자:</strong> ${o.ordererName} (${o.ordererPhone})</p>
                    <p><strong>주소:</strong> ${o.ordererAddress || '-'}</p>
                    <hr style="margin:8px 0;">
                    <p><strong>받는분:</strong> ${o.receiverName || '-'} (${o.receiverPhone || '-'})</p>
                    <p><strong>배송지:</strong> ${o.receiverAddress || '-'}</p>
                    <hr style="margin:8px 0;">
                    <p><strong>주문:</strong> ${o.menu}</p>
                    <p><strong>배송:</strong> ${o.deliveryDate} ${o.deliveryTime || ''}</p>
                    <p><strong>금액:</strong> ${o.amount ? parseInt(o.amount).toLocaleString() + '원' : '-'}</p>
                    <p><strong>입금:</strong> ${o.paymentStatus} / ${o.paymentMethod || '-'}</p>
                    <p><strong>메모:</strong> ${o.memo || '-'}</p>
                </div>
                <div style="display:flex;gap:8px;margin-top:16px;">
                    <button class="btn btn-secondary" style="flex:1;" onclick="editOrder('${o.id}')">✏️ 수정</button>
                    <button class="btn btn-danger" style="flex:1;" onclick="deleteOrderFromModal('${o.id}')">🗑️ 삭제</button>
                </div>
            `;
            document.getElementById('orderModal').classList.add('active');
        }

        function editOrder(id) {
            const o = getOrders().find(x => x.id === id);
            if (!o) return;
            document.getElementById('editOrderId').value = o.id;
            document.getElementById('editOrdererName').value = o.ordererName;
            document.getElementById('editOrdererPhone').value = o.ordererPhone;
            document.getElementById('editOrdererAddress').value = o.ordererAddress || '';
            document.getElementById('editReceiverName').value = o.receiverName || '';
            document.getElementById('editReceiverPhone').value = o.receiverPhone || '';
            document.getElementById('editReceiverAddress').value = o.receiverAddress || '';
            document.getElementById('editMenu').value = o.menu;
            document.getElementById('editDeliveryDate').value = o.deliveryDate;
            document.getElementById('editDeliveryTime').value = o.deliveryTime || '';
            document.getElementById('editAmount').value = o.amount || '';
            document.getElementById('editPaymentStatus').value = o.paymentStatus;
            document.getElementById('editOrderMemo').value = o.memo || '';
            closeModal('orderModal');
            document.getElementById('editOrderModal').classList.add('active');
        }

        async function saveOrderEdit() {
            const id = document.getElementById('editOrderId').value;
            const orders = getOrders();
            const idx = orders.findIndex(o => o.id === id);
            if (idx === -1) return;
            
            orders[idx] = { ...orders[idx],
                ordererName: document.getElementById('editOrdererName').value.trim(),
                ordererPhone: document.getElementById('editOrdererPhone').value.trim(),
                ordererAddress: document.getElementById('editOrdererAddress').value.trim(),
                receiverName: document.getElementById('editReceiverName').value.trim(),
                receiverPhone: document.getElementById('editReceiverPhone').value.trim(),
                receiverAddress: document.getElementById('editReceiverAddress').value.trim(),
                menu: document.getElementById('editMenu').value.trim(),
                deliveryDate: document.getElementById('editDeliveryDate').value,
                deliveryTime: document.getElementById('editDeliveryTime').value,
                amount: document.getElementById('editAmount').value.replace(/,/g, ''),
                paymentStatus: document.getElementById('editPaymentStatus').value,
                memo: document.getElementById('editOrderMemo').value.trim()
            };
            
            saveOrders(orders);
            await saveToServer('saveOrder', orders[idx]);
            alert('✅ 수정되었습니다!');
            closeModal('editOrderModal');
            renderAll();
        }

        async function deleteOrder(id) {
            if (!confirm('삭제하시겠습니까?')) return;
            const orders = getOrders().filter(o => o.id !== id);
            saveOrders(orders);
            await deleteFromServer('deleteOrder', id);
            renderAll();
        }

        async function deleteOrderFromModal(id) {
            closeModal('orderModal');
            await deleteOrder(id);
        }

        // 메모장
        function renderMemoFolders() {
            const folders = getFolders();
            const memos = getMemos();
            document.getElementById('folderList').innerHTML = folders.map(f => {
                const count = memos.filter(m => m.folderId === f.id).length;
                return `
                    <div class="folder-card" onclick="openFolder(${f.id})">
                        <div class="folder-icon">${f.icon}</div>
                        <div class="folder-info">
                            <div class="folder-name">${f.name}</div>
                            <div class="folder-count">메모 ${count}개</div>
                        </div>
                        <div class="folder-actions" onclick="event.stopPropagation()">
                            <button onclick="editFolder(${f.id})">✏️</button>
                            <button onclick="deleteFolder(${f.id})">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openFolder(id) {
            currentFolderId = id;
            const f = getFolders().find(x => x.id === id);
            document.getElementById('currentFolderName').textContent = f ? `${f.icon} ${f.name}` : '';
            document.getElementById('memoFolderView').style.display = 'none';
            document.getElementById('memoDetailView').style.display = 'block';
            renderMemos();
        }

        function backToFolders() {
            currentFolderId = null;
            document.getElementById('memoFolderView').style.display = 'block';
            document.getElementById('memoDetailView').style.display = 'none';
        }

        function renderMemos() {
            const memos = getMemos().filter(m => m.folderId === currentFolderId).sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
            const list = document.getElementById('memoList');
            if (!memos.length) { list.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">메모 없음</div>'; return; }
            list.innerHTML = memos.map(m => `
                <div class="memo-card" onclick="viewMemo(${m.id})">
                    <div class="memo-title">${m.title}</div>
                    <div class="memo-preview">${m.content.substring(0, 50)}${m.content.length > 50 ? '...' : ''}</div>
                    <div class="memo-date">${new Date(m.updatedAt).toLocaleDateString('ko-KR')}</div>
                </div>
            `).join('');
        }

        function showAddFolderModal() {
            document.getElementById('folderModalTitle').textContent = '📁 새 폴더';
            document.getElementById('editFolderId').value = '';
            document.getElementById('folderNameInput').value = '';
            selectedFolderIcon = '📁';
            renderIconGrid();
            document.getElementById('folderModal').classList.add('active');
        }

        function editFolder(id) {
            const f = getFolders().find(x => x.id === id);
            if (!f) return;
            document.getElementById('folderModalTitle').textContent = '📁 폴더 수정';
            document.getElementById('editFolderId').value = id;
            document.getElementById('folderNameInput').value = f.name;
            selectedFolderIcon = f.icon;
            renderIconGrid();
            document.getElementById('folderModal').classList.add('active');
        }

        function renderIconGrid() {
            document.getElementById('iconGrid').innerHTML = FOLDER_ICONS.map(i => `<div class="icon-option ${i === selectedFolderIcon ? 'selected' : ''}" onclick="selectedFolderIcon='${i}';renderIconGrid();">${i}</div>`).join('');
        }

        async function saveFolder() {
            const name = document.getElementById('folderNameInput').value.trim();
            if (!name) { alert('이름을 입력하세요'); return; }
            
            const folders = getFolders();
            const editId = document.getElementById('editFolderId').value;
            let folder;
            
            if (editId) {
                const idx = folders.findIndex(f => f.id === parseInt(editId));
                if (idx !== -1) { folders[idx].name = name; folders[idx].icon = selectedFolderIcon; folder = folders[idx]; }
            } else {
                folder = { id: Date.now(), name, icon: selectedFolderIcon };
                folders.push(folder);
            }
            
            saveFolders(folders);
            await saveToServer('saveFolder', folder);
            closeModal('folderModal');
            renderMemoFolders();
            alert('✅ 저장되었습니다!');
        }

        async function deleteFolder(id) {
            if (!confirm('폴더와 메모가 모두 삭제됩니다')) return;
            saveFolders(getFolders().filter(f => f.id !== id));
            saveMemos(getMemos().filter(m => m.folderId !== id));
            await deleteFromServer('deleteFolder', id);
            renderMemoFolders();
        }

        function showAddMemoModal() {
            document.getElementById('memoModalTitle').textContent = '📝 새 메모';
            document.getElementById('editMemoId').value = '';
            document.getElementById('memoTitleInput').value = '';
            document.getElementById('memoContentInput').value = '';
            document.getElementById('memoModal').classList.add('active');
        }

        async function saveMemo() {
            const title = document.getElementById('memoTitleInput').value.trim();
            const content = document.getElementById('memoContentInput').value.trim();
            if (!title) { alert('제목을 입력하세요'); return; }
            
            const memos = getMemos();
            const editId = document.getElementById('editMemoId').value;
            let memo;
            
            if (editId) {
                const idx = memos.findIndex(m => m.id === parseInt(editId));
                if (idx !== -1) { memos[idx].title = title; memos[idx].content = content; memos[idx].updatedAt = new Date().toISOString(); memo = memos[idx]; }
            } else {
                memo = { id: Date.now(), folderId: currentFolderId, title, content, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
                memos.push(memo);
            }
            
            saveMemos(memos);
            await saveToServer('saveMemo', memo);
            closeModal('memoModal');
            renderMemos();
            alert('✅ 저장되었습니다!');
        }

        function viewMemo(id) {
            const m = getMemos().find(x => x.id === id);
            if (!m) return;
            currentMemoId = id;
            document.getElementById('memoViewTitle').textContent = m.title;
            document.getElementById('memoViewContent').textContent = m.content;
            document.getElementById('memoViewModal').classList.add('active');
        }

        function editCurrentMemo() {
            const m = getMemos().find(x => x.id === currentMemoId);
            if (!m) return;
            closeModal('memoViewModal');
            document.getElementById('memoModalTitle').textContent = '📝 메모 수정';
            document.getElementById('editMemoId').value = m.id;
            document.getElementById('memoTitleInput').value = m.title;
            document.getElementById('memoContentInput').value = m.content;
            document.getElementById('memoModal').classList.add('active');
        }

        async function deleteCurrentMemo() {
            if (!confirm('삭제하시겠습니까?')) return;
            saveMemos(getMemos().filter(m => m.id !== currentMemoId));
            await deleteFromServer('deleteMemo', currentMemoId);
            closeModal('memoViewModal');
            renderMemos();
        }

        // 통계
        function updateStats() {
            const start = document.getElementById('statsStartDate').value;
            const end = document.getElementById('statsEndDate').value;
            const orders = getOrders().filter(o => o.deliveryDate >= start && o.deliveryDate <= end);
            
            document.getElementById('statTotalOrders').textContent = orders.length;
            document.getElementById('statTotalRevenue').textContent = orders.reduce((s, o) => s + parseInt(o.amount || 0), 0).toLocaleString();
            document.getElementById('statPending').textContent = orders.filter(o => o.paymentStatus === '미입금').length;
            document.getElementById('statCompleted').textContent = orders.filter(o => o.paymentStatus === '입금완료').length;
            
            const sourceMap = {};
            orders.forEach(o => { const s = o.source || '미지정'; sourceMap[s] = (sourceMap[s] || 0) + 1; });
            const sources = Object.entries(sourceMap).sort((a, b) => b[1] - a[1]);
            document.getElementById('sourceStats').innerHTML = sources.length ? sources.map(([s, c]) => `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;"><span>${s}</span><span style="font-weight:600;color:#F97316;">${c}건</span></div>`).join('') : '<div style="text-align:center;color:#999;">데이터 없음</div>';
        }

        // 백업/복원
        function backupData() {
            const data = { orders: getOrders(), folders: getFolders(), memos: getMemos() };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `떡뜨래_백업_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        function restoreData(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (data.orders) localStorage.setItem('dduck_orders', JSON.stringify(data.orders));
                    if (data.folders) localStorage.setItem('dduck_folders', JSON.stringify(data.folders));
                    if (data.memos) localStorage.setItem('dduck_memos', JSON.stringify(data.memos));
                    alert('✅ 복원되었습니다!');
                    renderAll();
                } catch (err) { alert('❌ 파일 오류'); }
            };
            reader.readAsText(file);
        }

        function clearAllData() {
            if (!confirm('모든 데이터를 삭제하시겠습니까?')) return;
            if (!confirm('정말 삭제하시겠습니까? 되돌릴 수 없습니다.')) return;
            localStorage.removeItem('dduck_orders');
            localStorage.removeItem('dduck_folders');
            localStorage.removeItem('dduck_memos');
            initDefaultData();
            alert('✅ 삭제되었습니다.');
            renderAll();
        }

        // 전체 렌더링
        function renderAll() {
            renderCustomers();
            renderTodayDelivery();
            renderOrderStatus();
            renderMemoFolders();
            updateStats();
        }

        // 클릭시 자동완성 닫기
        document.addEventListener('click', e => {
            if (!e.target.closest('.form-group')) {
                document.querySelectorAll('.autocomplete-dropdown').forEach(d => d.classList.remove('show'));
            }
        });
    </script>
</body>
</html>
